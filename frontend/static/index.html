<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDD Generator - Software Development Document Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        button.primary {
            background: #667eea;
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button.primary:hover {
            background: #5568d3;
        }

        button.primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .result-box h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .mermaid-diagram {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 SDD Generator</h1>
            <p class="subtitle">Generate Software Development Documents from business requirements and regulatory documents using AI</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('generate')">Generate SDD</button>
            <button class="tab-btn" onclick="showTab('regulatory')">Regulatory Docs</button>
            <button class="tab-btn" onclick="showTab('code')">Code Context</button>
            <button class="tab-btn" onclick="showTab('diagrams')">Diagrams</button>
        </div>

        <!-- Generate SDD Tab -->
        <div id="generate-tab" class="tab-content active">
            <h2>Generate Software Development Document</h2>
            <div class="form-group">
                <label for="sdd-title">Document Title</label>
                <input type="text" id="sdd-title" placeholder="e.g., Payment Processing System">
            </div>
            <div class="form-group">
                <label for="business-requirements">Business Requirements</label>
                <textarea id="business-requirements" placeholder="Describe your business requirements in detail..."></textarea>
            </div>
            <div class="form-group">
                <label for="regulatory-query">Regulatory Context (Optional)</label>
                <input type="text" id="regulatory-query" placeholder="Search terms for relevant regulatory documents (e.g., GDPR, PCI-DSS)">
            </div>
            <button class="primary" onclick="generateSDD()" id="generate-btn">
                Generate SDD
            </button>
            <div id="sdd-result"></div>
        </div>

        <!-- Regulatory Documents Tab -->
        <div id="regulatory-tab" class="tab-content">
            <h2>Regulatory Document Management</h2>
            <div class="form-group">
                <label for="regulatory-file">Upload Regulatory Document</label>
                <input type="file" id="regulatory-file" accept=".txt,.pdf,.md,.doc,.docx">
            </div>
            <button class="primary" onclick="uploadRegulatory()" id="upload-btn">
                Upload Document
            </button>
            
            <div class="form-group" style="margin-top: 30px;">
                <label for="regulatory-search">Search Regulatory Documents</label>
                <input type="text" id="regulatory-search" placeholder="Enter search query...">
            </div>
            <button class="primary" onclick="searchRegulatory()">
                Search
            </button>
            
            <div id="regulatory-result"></div>
        </div>

        <!-- Code Context Tab -->
        <div id="code-tab" class="tab-content">
            <h2>Code Context Management</h2>
            <div class="form-group">
                <label for="code-filename">Filename</label>
                <input type="text" id="code-filename" placeholder="e.g., payment_processor.py">
            </div>
            <div class="form-group">
                <label for="code-language">Language</label>
                <input type="text" id="code-language" value="python" placeholder="e.g., python, javascript, java">
            </div>
            <div class="form-group">
                <label for="code-content">Code</label>
                <textarea id="code-content" placeholder="Paste your code here..." style="min-height: 300px; font-family: monospace;"></textarea>
            </div>
            <button class="primary" onclick="storeCode()" id="store-code-btn">
                Store Code
            </button>
            
            <div style="margin-top: 30px;">
                <h3>Analyze Code Change</h3>
                <div class="form-group">
                    <label for="code-id">Code ID</label>
                    <input type="text" id="code-id" placeholder="Enter code ID from stored code">
                </div>
                <div class="form-group">
                    <label for="change-request">Change Request Description</label>
                    <textarea id="change-request" placeholder="Describe the proposed change..."></textarea>
                </div>
                <button class="primary" onclick="analyzeCodeChange()">
                    Analyze Impact
                </button>
            </div>
            
            <div id="code-result"></div>
        </div>

        <!-- Diagrams Tab -->
        <div id="diagrams-tab" class="tab-content">
            <h2>Architecture Diagrams</h2>
            <div class="form-group">
                <label for="sdd-file-select">Select SDD File</label>
                <select id="sdd-file-select" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                    <option value="">Loading SDD files...</option>
                </select>
            </div>
            <button class="primary" onclick="generateDiagram()">
                Generate Diagram
            </button>
            
            <div id="diagram-result"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        const API_BASE = '';
        
        // Initialize mermaid
        mermaid.initialize({ startOnLoad: false });

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'diagrams') {
                loadSDDFiles();
            }
        }

        async function generateSDD() {
            const title = document.getElementById('sdd-title').value;
            const requirements = document.getElementById('business-requirements').value;
            const regulatoryQuery = document.getElementById('regulatory-query').value;
            
            if (!title || !requirements) {
                alert('Please fill in title and business requirements');
                return;
            }
            
            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Generating...';
            
            try {
                const response = await fetch(`${API_BASE}/api/sdd/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        requirements: requirements,
                        regulatory_query: regulatoryQuery || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('sdd-result').innerHTML = `
                        <div class="alert alert-success">✅ ${data.message}</div>
                        <div class="result-box">
                            <h3>Generated SDD: ${data.filename}</h3>
                            <pre>${escapeHtml(data.content.substring(0, 2000))}${data.content.length > 2000 ? '...' : ''}</pre>
                        </div>
                    `;
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                document.getElementById('sdd-result').innerHTML = `
                    <div class="alert alert-error">❌ Error: ${error.message}</div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Generate SDD';
            }
        }

        async function uploadRegulatory() {
            const fileInput = document.getElementById('regulatory-file');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Uploading...';
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch(`${API_BASE}/api/regulatory/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('regulatory-result').innerHTML = `
                        <div class="alert alert-success">
                            ✅ ${data.message}<br>
                            Chunks indexed: ${data.chunks_indexed}
                        </div>
                    `;
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                document.getElementById('regulatory-result').innerHTML = `
                    <div class="alert alert-error">❌ Error: ${error.message}</div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Upload Document';
            }
        }

        async function searchRegulatory() {
            const query = document.getElementById('regulatory-search').value;
            
            if (!query) {
                alert('Please enter a search query');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/regulatory/search?query=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (response.ok && data.results.length > 0) {
                    let resultsHtml = '<div class="grid">';
                    data.results.forEach((result, index) => {
                        resultsHtml += `
                            <div class="card">
                                <h4>Result ${index + 1} (Score: ${(result.relevance_score * 100).toFixed(1)}%)</h4>
                                <p><strong>Source:</strong> ${result.source}</p>
                                <p style="margin-top: 10px; font-size: 13px;">${escapeHtml(result.content)}</p>
                            </div>
                        `;
                    });
                    resultsHtml += '</div>';
                    document.getElementById('regulatory-result').innerHTML = resultsHtml;
                } else {
                    document.getElementById('regulatory-result').innerHTML = `
                        <div class="alert alert-error">No results found</div>
                    `;
                }
            } catch (error) {
                document.getElementById('regulatory-result').innerHTML = `
                    <div class="alert alert-error">❌ Error: ${error.message}</div>
                `;
            }
        }

        async function storeCode() {
            const filename = document.getElementById('code-filename').value;
            const language = document.getElementById('code-language').value;
            const code = document.getElementById('code-content').value;
            
            if (!filename || !code) {
                alert('Please fill in filename and code');
                return;
            }
            
            const btn = document.getElementById('store-code-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Storing...';
            
            try {
                const response = await fetch(`${API_BASE}/api/code/store`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: filename,
                        language: language,
                        code: code
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('code-result').innerHTML = `
                        <div class="alert alert-success">
                            ✅ ${data.message}<br>
                            <strong>Code ID:</strong> ${data.code_id}
                        </div>
                    `;
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                document.getElementById('code-result').innerHTML = `
                    <div class="alert alert-error">❌ Error: ${error.message}</div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Store Code';
            }
        }

        async function analyzeCodeChange() {
            const codeId = document.getElementById('code-id').value;
            const changeRequest = document.getElementById('change-request').value;
            
            if (!codeId || !changeRequest) {
                alert('Please fill in code ID and change request');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/code/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code_id: codeId,
                        change_description: changeRequest
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const analysis = data.analysis;
                    document.getElementById('code-result').innerHTML = `
                        <div class="result-box">
                            <h3>Impact Analysis</h3>
                            <div class="grid">
                                <div class="card">
                                    <h4>Risk Level</h4>
                                    <p style="font-size: 24px; color: ${analysis.risk_level === 'high' ? '#dc3545' : analysis.risk_level === 'medium' ? '#ffc107' : '#28a745'}">
                                        ${analysis.risk_level.toUpperCase()}
                                    </p>
                                </div>
                                <div class="card">
                                    <h4>Affected Components</h4>
                                    <ul>${analysis.affected_components.map(c => `<li>${c}</li>`).join('')}</ul>
                                </div>
                            </div>
                            <div style="margin-top: 20px;">
                                <h4>Recommended Changes</h4>
                                <ul>${analysis.recommended_changes.map(c => `<li>${c}</li>`).join('')}</ul>
                            </div>
                            <div style="margin-top: 20px;">
                                <h4>Compliance Impact</h4>
                                <p>${analysis.compliance_impact}</p>
                            </div>
                            <div style="margin-top: 20px;">
                                <h4>Testing Requirements</h4>
                                <ul>${analysis.testing_requirements.map(t => `<li>${t}</li>`).join('')}</ul>
                            </div>
                        </div>
                    `;
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                document.getElementById('code-result').innerHTML = `
                    <div class="alert alert-error">❌ Error: ${error.message}</div>
                `;
            }
        }

        async function loadSDDFiles() {
            try {
                const response = await fetch(`${API_BASE}/api/sdd/list`);
                const data = await response.json();
                
                const select = document.getElementById('sdd-file-select');
                if (data.sdds.length > 0) {
                    select.innerHTML = data.sdds.map(sdd => 
                        `<option value="${sdd.filename}">${sdd.filename}</option>`
                    ).join('');
                } else {
                    select.innerHTML = '<option value="">No SDD files found</option>';
                }
            } catch (error) {
                console.error('Error loading SDD files:', error);
            }
        }

        async function generateDiagram() {
            const sddFilename = document.getElementById('sdd-file-select').value;
            
            if (!sddFilename) {
                alert('Please select an SDD file');
                return;
            }
            
            const formData = new FormData();
            formData.append('sdd_filename', sddFilename);
            
            try {
                const response = await fetch(`${API_BASE}/api/diagram/generate`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('diagram-result').innerHTML = `
                        <div class="mermaid-diagram">
                            <h3>Architecture Diagram</h3>
                            <div class="mermaid">
                                ${data.mermaid_diagram}
                            </div>
                        </div>
                    `;
                    await mermaid.run();
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                document.getElementById('diagram-result').innerHTML = `
                    <div class="alert alert-error">❌ Error: ${error.message}</div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
